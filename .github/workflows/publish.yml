name: Publish

on:
  release:
    types: [published]

jobs:
  validate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Verify release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          tag = os.environ["RELEASE_TAG"].lstrip("v")
          if tag != version:
              raise SystemExit(
                  f"Release tag '{os.environ['RELEASE_TAG']}' does not match version '{version}'."
              )
          print(f"Release tag matches project version: {version}")
          PY

      - name: Build distributions
        run: |
          uv build

      - name: Validate package metadata
        run: |
          uvx twine check dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/talk-tag

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
