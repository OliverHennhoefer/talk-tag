name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "13 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - id: codeql_analyze
        name: Analyze
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      - name: CodeQL upload unavailable notice
        if: steps.codeql_analyze.outcome == 'failure'
        run: |
          echo "::warning::Code scanning upload is not enabled for this repository. Enable Code scanning at settings/security_analysis to enforce CodeQL alerts."

  dependency-review:
    if: github.event_name == 'pull_request'
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - id: dependency_review
        uses: actions/dependency-review-action@v4
        continue-on-error: true

      - name: Dependency review unavailable notice
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review is not enabled for this repository. Enable Dependency graph and GitHub Advanced Security at settings/security_analysis to enforce this check."

  dependency-audit:
    if: github.event_name != 'pull_request'
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install dependencies for audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs,qa,runtime]"
          python -m pip install pip-audit

      - name: Run dependency audit
        run: |
          pip-audit
