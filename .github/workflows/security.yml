name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "13 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - id: codeql_analyze
        name: Analyze
        uses: github/codeql-action/analyze@v4
        continue-on-error: true

      - name: CodeQL upload unavailable notice
        if: steps.codeql_analyze.outcome == 'failure'
        run: |
          echo "::warning::Code scanning upload is not enabled for this repository. Enable Code scanning at settings/security_analysis to enforce CodeQL alerts."

  dependency-review:
    if: github.event_name == 'pull_request'
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - id: dependency_review
        uses: actions/dependency-review-action@v5
        continue-on-error: true

      - name: Dependency review unavailable notice
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review is not enabled for this repository. Enable Dependency graph and GitHub Advanced Security at settings/security_analysis to enforce this check."
