name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for us to reproduce it.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 0.3.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and installation method.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: "Provide step-by-step instructions to reproduce the issue."
      placeholder: |
        1. Install the package with `pip install ...`
        2. Run the following code: `...`
        3. Observe the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened? Include any error messages."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and stack traces
      render: shell
    validations:
      required: false
